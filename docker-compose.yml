version: "3.8"

services:
  app:
    image: ${PROJECT_NAME:-ntnu-autism-final}:${PROJECT_VERSION:-latest}
    ports:
      - "8001:8001"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2:7b}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PAID_GEMINI_API_KEY=${PAID_GEMINI_API_KEY:-}
      - PAID_GEMINI_ENABLED=${PAID_GEMINI_ENABLED:-true}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/records.db}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
